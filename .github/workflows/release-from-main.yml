name: Release from main

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  actions: write
  contents: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: macos-15

    steps:
      - name: Check out released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"

          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::VERSION must be semantic, for example 0.1.1."
            exit 1
          fi

          if echo "$version" | grep -Eq 'SNAPSHOT'; then
            echo "::error::VERSION must be a release version, not a snapshot."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check existing tag
        id: tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.version.outputs.tag }} already exists; skipping release dispatch."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and dispatch release
        if: steps.tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release logister-ios ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}" -f version="${{ steps.version.outputs.version }}"
