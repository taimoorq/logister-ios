name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Secret scan
        run: bash scripts/secret-scan.sh

      - name: Run tests
        run: swift test
