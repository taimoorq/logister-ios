name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.0.
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set release version
        id: release_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::Version must be semantic, for example 0.1.0."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Secret scan
        run: bash scripts/secret-scan.sh

      - name: Run tests
        run: swift test

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_version.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "Swift Package release $TAG_NAME"
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes "Swift Package release $TAG_NAME"
          fi
